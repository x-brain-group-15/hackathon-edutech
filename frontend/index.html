<!DOCTYPE html>
<html lang="en" data-lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title id="page-title">StudyBot — AI Study Buddy</title>
  <link rel="stylesheet" href="global.css">
  <script>
    // ---------- Early Theme & Language Initialization ----------
    (function () {
      const savedTheme = localStorage.getItem('studybot-theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);
      const storedLang = localStorage.getItem('studybot-lang');
      const browserLang = (navigator.language || 'en').toLowerCase();
      const initialLang = storedLang || (browserLang.startsWith('vi') ? 'vi' : 'en');
      document.documentElement.setAttribute('data-lang', initialLang);
      document.documentElement.lang = initialLang;
    })();

    // toggleTheme defined early so inline onclick always works even if main
    // script has a parse error or hasn't loaded yet
    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
      const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('studybot-theme', newTheme);
      if (typeof toast === 'function' && typeof t === 'function') {
        const modeLabel = newTheme === 'dark' ? t('themeDark') : t('themeLight');
        toast(t('themeSwitched', { mode: modeLabel }), 'success');
      }
    }
  </script>
</head>

              d="M12.316 3.051a1 1 0 01.633 1.265l-4 12a1 1 0 11-1.898-.632l4-12a1 1 0 011.265-.633zM5.707 6.293a1 1 0 010 1.414L3.414 10l2.293 2.293a1 1 0 11-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0zm8.586 0a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 11-1.414-1.414L16.586 10l-2.293-2.293a1 1 0 010-1.414z"

  <div class="toasts" id="toasts"></div>

  <script>
    // ============================================================================
    // Config
    // ============================================================================
    const API_BASE = (window.API_BASE
      || new URLSearchParams(location.search).get('api')
      || '').replace(/\/$/, '');

    const USER_ID = (new URLSearchParams(location.search).get('user') || 'test-user-001');

    // ============================================================================
    // Helpers
    // ============================================================================
    function $(id) { return document.getElementById(id); }

function toggleStrategyFields() {
  const strat = $('chunk-strategy').value;
  if (strat === 'fixed') {
    $('field-size').style.display = 'block';
    $('field-overlap').style.display = 'block';
    $('field-threshold').style.display = 'none';
  } else if (strat === 'semantic') {
    $('field-size').style.display = 'none';
    $('field-overlap').style.display = 'none';
    $('field-threshold').style.display = 'block';
  } else {
    $('field-size').style.display = 'none';
    $('field-overlap').style.display = 'none';
    $('field-threshold').style.display = 'none';
  }
}

// ============================================================================
// Backend status
// ============================================================================
async function loadStatus() {
  const res = await call('/health');
  if (!res.ok) {
    $('status-pills').innerHTML = `<span class="pill error">${t('statusOffline')}</span>`;
    return;
  }
  
  const statusHtml = Object.entries(res.body.backends)
    .map(([k, v]) => {
      const label = v === 'local' ? t('statusLocal') : t('statusRemote');
      return `<span class="pill ${v === 'local' ? 'local' : 'remote'}">${k}: ${label}</span>`;
    })
    .join('');
    
  const tenantBadgeHtml = `<span class="pill" style="border-color: rgba(var(--accent-rgb), 0.3); background: rgba(var(--accent-rgb), 0.1); color: var(--accent);">${t('statusTenant')}: ${ACTIVE_TENANT}</span>`;
  
  $('status-pills').innerHTML = tenantBadgeHtml + statusHtml;
}

    function logDebug(label, data) {
      const lines = $('debug-log').textContent === 'No requests yet.' ? [] : $('debug-log').textContent.split('\n');
      lines.unshift(`── ${new Date().toLocaleTimeString()} — ${label} ──\n${JSON.stringify(data, null, 2)}\n`);
      $('debug-log').textContent = lines.slice(0, 6).join('\n');
    }

    async function call(path, opts = {}) {
      opts.headers = Object.assign({ 'X-User-Id': USER_ID }, opts.headers || {});
      const r = await fetch(API_BASE + path, opts);
      const text = await r.text();
      let body;
      try { body = JSON.parse(text); } catch { body = text; }
      logDebug(`${opts.method || 'GET'} ${path}`, body);
      return { ok: r.ok, status: r.status, body };
    }

async function doUpload(file) {
  const MAX_SIZE_MB = 10;
  const MAX_SIZE_BYTES = MAX_SIZE_MB * 1024 * 1024;
  if (file.size > MAX_SIZE_BYTES) {
    const sizeInMB = (file.size / (1024 * 1024)).toFixed(1);
    const errorMsg = t('fileTooLarge', {size: sizeInMB, max: MAX_SIZE_MB});
    toast(errorMsg, 'error');
    $('upload-result').innerHTML = `
      <p style="color:var(--error); margin:0.8rem 0 0; font-size: 0.88rem; font-weight: 500;">
        ${errorMsg}
      </p>`;
    return;
  }

  $('upload-result').innerHTML = `
    <p class="muted" style="margin:0.8rem 0 0; font-size: 0.88rem; display: flex; align-items: center; gap: 0.5rem;">
      <span class="spinner"></span> 
      ${t('uploading', {filename: file.name, size: (file.size/1024).toFixed(1)})}
    </p>`;
    
  const fd = new FormData();
  fd.append('file', file);

  const strategy = $('chunk-strategy').value;
  const size = $('chunk-size').value;
  const overlap = $('chunk-overlap').value;
  const threshold = $('chunk-threshold').value;

  let queryParams = `?strategy=${strategy}`;
  if (strategy === 'fixed') {
    queryParams += `&size=${size}&overlap=${overlap}`;
  } else if (strategy === 'semantic') {
    queryParams += `&threshold=${threshold}`;
  }

  const res = await call(`/upload${queryParams}`, {method: 'POST', body: fd});
  
  if (!res.ok) {
    toast(t('uploadFailed', {detail: res.body.detail || res.status}), 'error');
    $('upload-result').innerHTML = `
      <p style="color:var(--error); margin:0.8rem 0 0; font-size: 0.88rem; font-weight: 500;">
        ${res.body.detail || t('uploadFailedShort')}
      </p>`;
    return;
  }
  
  const b = res.body;
  $('upload-result').innerHTML = `
    <div class="upload-success-alert">
      <div class="upload-success-title">
        <svg style="width:16px;height:16px;" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
        </svg>
        <strong>${b.filename}</strong>
      </div>
      <div>${t('uploadSuccessChars', {chars: b.chars_extracted.toLocaleString()})}${t('uploadChunkPrefix')}<code>${strategy}</code>${t('uploadChunkSuffix')}</div>
      <div class="upload-success-meta">${t('uploadSuccessDoc', {docId: b.doc_id})}</div>
    </div>`;
    
  toast(t('uploadedToast', {filename: b.filename}), 'success');

  window.lastDocId = b.doc_id;
  window.lastDocName = b.filename;

  refresh();
}

const quizState = {
  items: [],
  index: 0,
  answers: {}
};

function shuffle(list) {
  const arr = list.slice();
  for (let i = arr.length - 1; i > 0; i -= 1) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function initQuiz() {
  const deck = QUIZ_BANK[currentLang] || QUIZ_BANK.en;
  quizState.items = shuffle(deck).slice(0, Math.min(5, deck.length));
  quizState.index = 0;
  quizState.answers = {};
  renderQuiz();
}

function getQuizScore() {
  return quizState.items.reduce((score, item) => {
    const answer = quizState.answers[item.id];
    return score + (answer === item.answer ? 1 : 0);
  }, 0);
}

function renderQuiz() {
  const questionEl = $('quiz-question');
  const optionsEl = $('quiz-options');
  const explainEl = $('quiz-explain');
  const progressEl = $('quiz-progress');
  const scoreEl = $('quiz-score');
  const prevBtn = $('quiz-prev');
  const nextBtn = $('quiz-next');

  if (!quizState.items.length) {
    questionEl.textContent = '';
    optionsEl.innerHTML = '';
    explainEl.textContent = '';
    progressEl.textContent = '';
    scoreEl.textContent = '';
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    return;
  }

  const current = quizState.items[quizState.index];
  const total = quizState.items.length;
  const answered = quizState.answers[current.id];

  progressEl.textContent = t('quizProgress', {index: quizState.index + 1, total});
  scoreEl.textContent = t('quizScore', {score: getQuizScore(), total});
  questionEl.textContent = current.question;

  optionsEl.innerHTML = current.options.map((opt, idx) => {
    const isSelected = answered === idx;
    const hasAnswer = typeof answered === 'number';
    const isCorrect = hasAnswer && idx === current.answer;
    const isWrong = hasAnswer && isSelected && idx !== current.answer;
    const classes = [
      'quiz-option',
      isSelected ? 'selected' : '',
      isCorrect ? 'correct' : '',
      isWrong ? 'wrong' : ''
    ].filter(Boolean).join(' ');

    return `<button type="button" class="${classes}" data-index="${idx}"><span>${opt}</span></button>`;
  }).join('');

  optionsEl.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      const idx = Number(btn.getAttribute('data-index'));
      quizState.answers[current.id] = idx;
      renderQuiz();
    });
  });

  if (typeof answered === 'number') {
    const isCorrect = answered === current.answer;
    explainEl.innerHTML = `
      <span class="quiz-badge ${isCorrect ? 'good' : 'bad'}">${isCorrect ? t('quizCorrect') : t('quizIncorrect')}</span>
      <span class="quiz-explain-text">${t('quizExplanation')}: ${current.explanation}</span>
    `;
  } else {
    explainEl.textContent = '';
  }

  prevBtn.disabled = quizState.index === 0;
  nextBtn.disabled = quizState.index >= total - 1;
}

$('quiz-prev').addEventListener('click', () => {
  if (quizState.index > 0) {
    quizState.index -= 1;
    renderQuiz();
  }
});

$('quiz-next').addEventListener('click', () => {
  if (quizState.index < quizState.items.length - 1) {
    quizState.index += 1;
    renderQuiz();
  }
});

$('quiz-reset').addEventListener('click', () => {
  initQuiz();
});

const flashState = {
  index: 0,
  flipped: false
};

function getFlashcardDeck() {
  return FLASHCARDS[currentLang] || FLASHCARDS.en;
}

function renderFlashcard() {
  const deck = getFlashcardDeck();
  const progressEl = $('flashcard-progress');
  const cardEl = $('flashcard');
  const frontEl = $('flashcard-front');
  const backEl = $('flashcard-back');
  const prevBtn = $('flashcard-prev');
  const nextBtn = $('flashcard-next');
  const flipBtn = $('flashcard-flip');

  if (!deck.length) {
    progressEl.textContent = '';
    frontEl.innerHTML = `<span class="flash-label">${t('flashcardFrontLabel')}</span><span class="flash-text muted">${t('flashcardEmptyFront')}</span>`;
    backEl.innerHTML = `<span class="flash-label">${t('flashcardBackLabel')}</span><span class="flash-text muted">${t('flashcardEmptyBack')}</span>`;
    cardEl.classList.remove('flipped');
    cardEl.disabled = true;
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    flipBtn.disabled = true;
    return;
  }

  if (flashState.index >= deck.length) {
    flashState.index = 0;
  }
  const current = deck[flashState.index];
  progressEl.textContent = t('flashcardProgress', {index: flashState.index + 1, total: deck.length});
  frontEl.innerHTML = `<span class="flash-label">${t('flashcardFrontLabel')}</span><span class="flash-text">${current.term}</span>`;
  backEl.innerHTML = `<span class="flash-label">${t('flashcardBackLabel')}</span><span class="flash-text">${current.definition}</span>`;
  cardEl.classList.toggle('flipped', flashState.flipped);
  cardEl.disabled = false;
  prevBtn.disabled = flashState.index === 0;
  nextBtn.disabled = flashState.index >= deck.length - 1;
  flipBtn.disabled = false;
}

function flipFlashcard() {
  flashState.flipped = !flashState.flipped;
  renderFlashcard();
}

function moveFlashcard(step) {
  const deck = getFlashcardDeck();
  const nextIndex = flashState.index + step;
  if (nextIndex >= 0 && nextIndex < deck.length) {
    flashState.index = nextIndex;
    flashState.flipped = false;
    renderFlashcard();
  }
}

$('flashcard').addEventListener('click', flipFlashcard);
$('flashcard-flip').addEventListener('click', flipFlashcard);
$('flashcard-prev').addEventListener('click', () => moveFlashcard(-1));
$('flashcard-next').addEventListener('click', () => moveFlashcard(1));

    strategy: strategy,
    size: parseInt(size) || 500,
    overlap: parseInt(overlap) || 100,

        <div style="display: grid; gap: 0.5rem; min-width: 0;">
          ${q.retrieved.map(r => `
            <div style="padding: 0.6rem; background: var(--card); border-left: 3px solid ${r.relevant ? 'var(--success)' : 'var(--error)'}; font-size: 0.78rem; border-radius: 0 4px 4px 0; border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); overflow: hidden; min-width: 0;">
              <div style="display:flex; justify-content: space-between; flex-wrap: wrap; gap: 0.25rem; font-weight:600; font-size: 0.72rem; color: var(--muted); margin-bottom:0.25rem; min-width: 0;">
                <span style="white-space: nowrap;">${t('benchmarkChunkLabel', {chunk: r.chunk, score: r.score.toFixed(2)})}</span>
                <span style="color: ${r.relevant ? 'var(--success)' : 'var(--error)'}; white-space: nowrap;">${r.relevant ? t('benchmarkRelevant') : t('benchmarkIrrelevant')}</span>
              </div>
              <div style="white-space: pre-wrap; word-break: break-word; overflow-wrap: break-word; font-family: var(--font-sans); line-height:1.4; color: var(--text); max-height: 8rem; overflow-y: auto;">${r.text.replace(/</g, '&lt;')}</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }).join('');


  toast(t('benchmarkSuccess'), 'success');
}

async function refresh() {
  const res = await call('/docs/list');
  if (!res.ok || !res.body.docs || !res.body.docs.length) {
    $('docs').innerHTML = `
      <div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 44px; height: 44px; margin-bottom: 0.5rem; opacity: 0.4;">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
        </svg>
        <div>${t('libraryEmpty')}</div>
      </div>`;
    $('benchmark-section').style.display = 'none';
    return;
  }

  $('benchmark-section').style.display = 'block';

  if (!window.lastDocId) {
    window.lastDocId = res.body.docs[0].doc_id;
    window.lastDocName = res.body.docs[0].filename;
  }

  $('docs').innerHTML = res.body.docs.map(d => {
    const isSelected = d.doc_id === (window.selectedDocId || window.lastDocId);
    if (isSelected) {
      window.selectedDocId = d.doc_id;
      window.selectedDocName = d.filename;
    }

    const hint = d.filename.toLowerCase().includes('photosynthesis')
      ? `<span class="doc-hint">💡 ${t('docRecommended')}</span>`
      : '';
      
    return `
      <div class="doc-item" style="cursor: pointer; ${isSelected ? 'border-color: var(--accent); background: rgba(var(--accent-rgb), 0.08);' : ''}" onclick="selectDoc('${d.doc_id}', '${d.filename}')">
        <div class="doc-item-left">
          <div class="doc-icon" style="${isSelected ? 'color: var(--accent); background: rgba(var(--accent-rgb), 0.15);' : ''}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
              <line x1="16" y1="13" x2="8" y2="13"></line>
              <line x1="16" y1="17" x2="8" y2="17"></line>
              <polyline points="10 9 9 9 8 9"></polyline>
            </svg>
          </div>
          <div class="doc-item-info">
            <div class="name">
              <span class="name-text">${isSelected ? '🔹 ' : ''}${d.filename || d.doc_id}</span>
              ${hint}
            </div>
            <div class="meta">${t('docMeta', {chars: (d.chars || 0).toLocaleString(), size: (d.size/1024).toFixed(1)})}</div>
          </div>
        </div>
        <div class="doc-item-right">
          <div class="doc-id">${(d.doc_id || '').slice(0, 8)}</div>
          <div class="doc-state">${isSelected ? t('docActive') : t('docSelect')}</div>
          <button class="ghost delete-btn" onclick="event.stopPropagation(); deleteDocument('${d.doc_id}', '${d.filename.replace(/'/g, "\\'")}')" title="${t('docDeleteTitle')}">
            <svg style="width:12px;height:12px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="3 6 5 6 21 6"></polyline>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            </svg>
            <span class="delete-text">${t('docDelete')}</span>
          </button>
        </div>
      </div>
    `;
  }).join('');
}

function selectDoc(docId, filename) {
  window.selectedDocId = docId;
  window.selectedDocName = filename;
  toast(t('docSelectedToast', {filename}), 'info');
  refresh();
}

async function deleteDocument(docId, filename) {
  if (!confirm(t('docDeleteConfirm', {filename}))) {
    return;
  }
  
  toast(t('docDeleteProgress', {filename}), 'info');
  const res = await call(`/ docs / ${ docId }`, {method: 'DELETE'});
  
  if (!res.ok) {
    toast(t('docDeleteFailed', {detail: res.body.detail || res.status}), 'error');
    return;
  }
  
  toast(t('docDeleteSuccess', {filename}), 'success');
  
  if (window.selectedDocId === docId || window.lastDocId === docId) {
    window.selectedDocId = null;
    window.selectedDocName = null;
    window.lastDocId = null;
    window.lastDocName = null;
  }
  
  refresh();
}

function filterDocs() {
  const query = $('doc-search').value.toLowerCase().trim();
  const items = document.querySelectorAll('.doc-item');
  items.forEach(item => {
    // Search within the name element
    const nameEl = item.querySelector('.name');
    if (nameEl) {
      const name = nameEl.textContent.toLowerCase();
      if (name.includes(query)) {
        item.style.display = 'flex';
      } else {
        item.style.display = 'none';
      }
    }
  });
}

      let currentLang = document.documentElement.getAttribute('data-lang') || 'en';

      function t(key, vars = {}) {
      const dict = I18N[currentLang] || I18N.en;
      let str = dict[key] || I18N.en[key] || key;
      Object.keys(vars).forEach(k => {
      str = str.replace(new RegExp(`\\{${k}\\}`, 'g'), vars[k]);
      });
      return str;
      }

      function applyI18n() {
      document.documentElement.lang = currentLang;
      document.documentElement.setAttribute('data-lang', currentLang);
      document.title = t('pageTitle');

      document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      el.textContent = t(key);
      });

      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
      const key = el.getAttribute('data-i18n-placeholder');
      el.setAttribute('placeholder', t(key));
      });

      document.querySelectorAll('[data-i18n-title]').forEach(el => {
      const key = el.getAttribute('data-i18n-title');
      el.setAttribute('title', t(key));
      });

      document.querySelectorAll('[data-i18n-aria]').forEach(el => {
      const key = el.getAttribute('data-i18n-aria');
      el.setAttribute('aria-label', t(key));
      });

      const debugLog = $('debug-log');
      if (debugLog && debugLog.getAttribute('data-empty') === 'true') {
      debugLog.textContent = t('debugEmpty');
      }
      }

      function setLanguage(lang) {
      currentLang = I18N[lang] ? lang : 'en';
      localStorage.setItem('studybot-lang', currentLang);
      applyI18n();
      updateLangButtons();
      renderWelcomeMessage();
      loadStatus();
      refresh();
      initQuiz();
      flashState.index = 0;
      flashState.flipped = false;
      renderFlashcard();
      }

      function updateLangButtons() {
      document.querySelectorAll('.lang-btn').forEach(btn => {
      const isActive = btn.getAttribute('data-lang') === currentLang;
      btn.classList.toggle('active', isActive);
      btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      });
      }

async function generateFlashcards() {
  const topic = $('flashcard-topic').value.trim();
  if (!topic) {
    toast('Please enter a topic first', 'warn');
    return;
  }
  
  $('btn-generate-flashcards').disabled = true;
  $('btn-generate-flashcards').innerHTML = '<span class="spinner"></span>';
  
  const docId = window.selectedDocId || window.lastDocId;
  const payload = {
    topic: topic,
    limit: 5,
    doc_id: docId || null
  };
  
  const res = await call('/flashcards', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  });
  
  $('btn-generate-flashcards').disabled = false;
  $('btn-generate-flashcards').textContent = 'Generate AI';
  
  if (!res.ok) {
    toast('Failed to generate flashcards', 'error');
    return;
  }
  
  const newCards = res.body.flashcards;
  if (newCards && newCards.length > 0) {
    FLASHCARDS[currentLang] = newCards.map(c => ({term: c.front, definition: c.back}));
    flashState.index = 0;
    flashState.flipped = false;
    renderFlashcard();
    toast('Flashcards generated!', 'success');
  } else {
    toast('No flashcards generated.', 'warn');
  }
}
