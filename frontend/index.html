<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StudyBot — AI Study Buddy</title>
<style>
  /* ---------- Design tokens ---------- */
  :root {
    --accent: #4f46e5;          /* StudyBot = indigo */
    --accent-light: #eef2ff;
    --accent-dark: #3730a3;
    --bg: #f8fafc;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e2e8f0;
    --shadow-sm: 0 1px 2px rgba(15, 23, 42, .06);
    --shadow: 0 1px 3px rgba(15, 23, 42, .08), 0 1px 2px rgba(15, 23, 42, .04);
    --shadow-lg: 0 10px 30px -10px rgba(15, 23, 42, .15);
    --radius: 12px;
    --radius-sm: 8px;
    --success: #059669;
    --warn: #b45309;
    --error: #dc2626;
  }
  /* ---------- Reset ---------- */
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, "Helvetica Neue", Arial, sans-serif;
    font-size: 15px;
    line-height: 1.55;
    color: var(--text);
    background: var(--bg);
    min-height: 100vh;
  }
  /* ---------- Topbar ---------- */
  .topbar {
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
    color: white;
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 2rem;
    flex-wrap: wrap;
    box-shadow: var(--shadow-lg);
  }
  .brand { display: flex; align-items: center; gap: 0.9rem; }
  .brand .logo {
    width: 44px; height: 44px;
    background: rgba(255, 255, 255, .18);
    border-radius: 10px;
    display: grid; place-items: center;
    font-size: 22px;
    backdrop-filter: blur(8px);
  }
  .brand h1 { margin: 0; font-size: 1.15rem; font-weight: 600; letter-spacing: -.01em; }
  .brand p { margin: 0; opacity: .85; font-size: 0.82rem; }
  .status-pills { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .pill {
    background: rgba(255, 255, 255, .15);
    padding: 0.25rem 0.6rem;
    border-radius: 100px;
    font-size: 0.72rem;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    backdrop-filter: blur(8px);
  }
  .pill.local { background: rgba(255, 191, 36, .25); }
  .pill.remote { background: rgba(34, 197, 94, .35); }

  /* ---------- Layout ---------- */
  .container {
    max-width: 880px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    display: grid;
    gap: 1.25rem;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.5rem;
    box-shadow: var(--shadow);
  }
  .card-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 1rem;
    gap: 1rem;
  }
  .card-header h2 { margin: 0; font-size: 1.05rem; font-weight: 600; letter-spacing: -.01em; }
  .card-header .step {
    background: var(--accent-light);
    color: var(--accent-dark);
    width: 26px; height: 26px;
    border-radius: 100px;
    display: inline-grid; place-items: center;
    font-size: 0.78rem; font-weight: 600;
    margin-right: 0.6rem;
    flex-shrink: 0;
  }
  .card-header .meta { color: var(--muted); font-size: 0.82rem; }

  /* ---------- Drop zone ---------- */
  .drop {
    border: 2px dashed var(--border);
    border-radius: var(--radius-sm);
    padding: 1.75rem 1rem;
    text-align: center;
    transition: all .15s ease;
    cursor: pointer;
  }
  .drop:hover { border-color: var(--accent); background: var(--accent-light); }
  .drop.dragover { border-color: var(--accent); background: var(--accent-light); transform: scale(1.01); }
  .drop svg { width: 38px; height: 38px; color: var(--muted); margin-bottom: 0.5rem; }
  .drop p { margin: 0.2rem 0; color: var(--muted); font-size: 0.92rem; }
  .drop .browse { color: var(--accent); font-weight: 500; text-decoration: underline; cursor: pointer; }
  .drop input[type=file] { display: none; }

  /* ---------- Inputs / buttons ---------- */
  .input-row { display: flex; gap: 0.6rem; }
  input[type=text] {
    flex: 1;
    padding: 0.65rem 0.85rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font: inherit;
    color: var(--text);
    background: white;
    transition: border-color .15s, box-shadow .15s;
  }
  input[type=text]:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(79, 70, 229, .12);
  }
  button {
    font: inherit;
    border: 0;
    border-radius: var(--radius-sm);
    padding: 0.65rem 1.2rem;
    cursor: pointer;
    transition: background .15s, transform .05s;
    font-weight: 500;
  }
  button.primary {
    background: var(--accent);
    color: white;
  }
  button.primary:hover { background: var(--accent-dark); }
  button.primary:active { transform: translateY(1px); }
  button.primary:disabled { background: var(--muted); cursor: not-allowed; }
  button.ghost {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--border);
  }
  button.ghost:hover { background: var(--accent-light); border-color: var(--accent); }

  /* ---------- Result blocks ---------- */
  .answer-card {
    margin-top: 1rem;
    padding: 1.1rem;
    background: linear-gradient(180deg, var(--accent-light) 0%, white 100%);
    border-radius: var(--radius-sm);
    border-left: 3px solid var(--accent);
    display: none;
  }
  .answer-card.visible { display: block; }
  .answer-text { white-space: pre-wrap; font-size: 0.94rem; color: var(--text); }
  .citations { margin-top: 1rem; }
  .citation {
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.7rem 0.9rem;
    margin-top: 0.5rem;
    font-size: 0.82rem;
  }
  .citation .head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 0.3rem;
    color: var(--muted); font-family: ui-monospace, Menlo, monospace; font-size: 0.74rem;
  }
  .citation .score {
    background: var(--accent-light); color: var(--accent-dark);
    padding: 0.1rem 0.45rem; border-radius: 100px; font-weight: 500;
  }
  .citation .body { color: var(--text); line-height: 1.5; }

  /* ---------- Doc list ---------- */
  .doc-list { display: grid; gap: 0.5rem; }
  .doc-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.65rem 0.9rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: white;
    font-size: 0.88rem;
    transition: border-color .15s;
  }
  .doc-item:hover { border-color: var(--accent); }
  .doc-item .name { font-weight: 500; }
  .doc-item .meta { color: var(--muted); font-size: 0.76rem; font-family: ui-monospace, Menlo, monospace; }

  /* ---------- Spinner ---------- */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--accent-light);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .8s linear infinite;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- Toast ---------- */
  .toasts {
    position: fixed;
    top: 1rem; right: 1rem;
    z-index: 1000;
    display: grid; gap: 0.5rem;
  }
  .toast {
    background: white;
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius-sm);
    padding: 0.7rem 1rem;
    box-shadow: var(--shadow-lg);
    min-width: 220px; max-width: 340px;
    font-size: 0.88rem;
    animation: slidein .25s ease-out;
  }
  .toast.success { border-left-color: var(--success); }
  .toast.error { border-left-color: var(--error); }
  .toast.warn { border-left-color: var(--warn); }
  @keyframes slidein { from { transform: translateX(120%); } to { transform: translateX(0); } }

  /* ---------- Misc ---------- */
  .muted { color: var(--muted); }
  .empty {
    text-align: center;
    color: var(--muted);
    padding: 1.5rem;
    font-size: 0.9rem;
  }
  details { font-size: 0.85rem; }
  details > summary { cursor: pointer; color: var(--muted); padding: 0.3rem 0; }
  details pre {
    background: #0f172a; color: #e2e8f0;
    padding: 0.8rem; border-radius: var(--radius-sm);
    font-size: 0.78rem; overflow: auto; max-height: 240px;
    font-family: ui-monospace, Menlo, monospace;
  }
  @media (max-width: 640px) {
    .topbar { padding: 1rem; }
    .container { padding: 1rem; }
    .input-row { flex-direction: column; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="logo">📚</span>
    <div>
      <h1>StudyBot</h1>
      <p>AI Study Buddy — upload notes, ask questions, get cited answers</p>
    </div>
  </div>
  <div class="status-pills" id="status-pills">
    <span class="pill"><span class="spinner" style="border-color:rgba(255,255,255,.3);border-top-color:white;"></span> loading…</span>
  </div>
</header>

<main class="container">

  <section class="card">
    <div class="card-header">
      <h2><span class="step">1</span>Upload a lecture</h2>
      <span class="meta">PDF, TXT, or Markdown</span>
    </div>
    <label class="drop" id="drop">
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 7.5m0 0L7.5 12M12 7.5v9"/>
      </svg>
      <p><strong>Drag a file here</strong> or <span class="browse">click to browse</span></p>
      <p style="font-size:0.78rem;">Max ~10MB. Try a Wikipedia article from <code>sample_data/</code>.</p>
      <input type="file" id="file" accept=".pdf,.txt,.md">
    </label>
    <div id="upload-result"></div>
  </section>

  <section class="card">
    <div class="card-header">
      <h2><span class="step">2</span>Ask a question</h2>
      <span class="meta">Grounded in your uploaded notes</span>
    </div>
    <div class="input-row">
      <input type="text" id="question" placeholder="e.g. What is photosynthesis?" autocomplete="off">
      <button class="primary" id="ask-btn" onclick="ask()">Ask</button>
    </div>
    <div class="answer-card" id="answer-card">
      <div class="answer-text" id="answer-text"></div>
      <div class="citations" id="citations"></div>
    </div>
  </section>

  <section class="card">
    <div class="card-header">
      <h2><span class="step">3</span>Your documents</h2>
      <button class="ghost" onclick="refresh()">Refresh</button>
    </div>
    <div class="doc-list" id="docs"><div class="empty">No documents yet — upload one above.</div></div>
  </section>

  <details>
    <summary>Raw API responses (debug)</summary>
    <pre id="debug-log">No requests yet.</pre>
  </details>

</main>

<div class="toasts" id="toasts"></div>

<script>
// ============================================================================
// Config
// ============================================================================
const API_BASE = (window.API_BASE
  || new URLSearchParams(location.search).get('api')
  || '').replace(/\/$/, '');

const USER_ID = (new URLSearchParams(location.search).get('user') || 'test-user-001');

// ============================================================================
// Helpers
// ============================================================================
function $(id) { return document.getElementById(id); }

function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  $('toasts').appendChild(el);
  setTimeout(() => el.style.opacity = '0', 2500);
  setTimeout(() => el.remove(), 3000);
}

function logDebug(label, data) {
  const lines = $('debug-log').textContent === 'No requests yet.' ? [] : $('debug-log').textContent.split('\n');
  lines.unshift(`── ${new Date().toLocaleTimeString()} — ${label} ──\n${JSON.stringify(data, null, 2)}\n`);
  $('debug-log').textContent = lines.slice(0, 6).join('\n');
}

async function call(path, opts = {}) {
  opts.headers = Object.assign({'X-User-Id': USER_ID}, opts.headers || {});
  const r = await fetch(API_BASE + path, opts);
  const text = await r.text();
  let body;
  try { body = JSON.parse(text); } catch { body = text; }
  logDebug(`${opts.method || 'GET'} ${path}`, body);
  return {ok: r.ok, status: r.status, body};
}

// ============================================================================
// Backend status
// ============================================================================
async function loadStatus() {
  const res = await call('/health');
  if (!res.ok) {
    $('status-pills').innerHTML = '<span class="pill error">backend offline</span>';
    return;
  }
  $('status-pills').innerHTML = Object.entries(res.body.backends)
    .map(([k, v]) => `<span class="pill ${v === 'local' ? 'local' : 'remote'}">${k}: ${v}</span>`)
    .join('');
}

// ============================================================================
// Upload
// ============================================================================
const drop = $('drop');
const fileInput = $('file');

drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => {
  e.preventDefault();
  drop.classList.remove('dragover');
  if (e.dataTransfer.files[0]) doUpload(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) doUpload(e.target.files[0]); });

async function doUpload(file) {
  $('upload-result').innerHTML = `<p class="muted" style="margin:0.8rem 0 0;"><span class="spinner"></span> Uploading ${file.name} (${(file.size/1024).toFixed(1)} KB)…</p>`;
  const fd = new FormData();
  fd.append('file', file);
  const res = await call('/upload', {method: 'POST', body: fd});
  if (!res.ok) {
    toast(`Upload failed: ${res.body.detail || res.status}`, 'error');
    $('upload-result').innerHTML = `<p style="color:var(--error); margin:0.8rem 0 0;">${res.body.detail || 'Upload failed'}</p>`;
    return;
  }
  const b = res.body;
  $('upload-result').innerHTML = `
    <div style="margin-top:0.8rem; padding:0.8rem; background:#f0fdf4; border-radius:var(--radius-sm); border-left:3px solid var(--success); font-size:0.88rem;">
      ✓ <strong>${b.filename}</strong> — ${b.chars_extracted.toLocaleString()} chars extracted &amp; indexed
      <div style="font-family:ui-monospace,Menlo,monospace; color:var(--muted); font-size:0.74rem; margin-top:0.25rem;">doc_id: ${b.doc_id}</div>
    </div>`;
  toast(`Uploaded ${b.filename}`, 'success');
  refresh();
}

// ============================================================================
// Ask
// ============================================================================
async function ask() {
  const q = $('question').value.trim();
  if (!q) { toast('Type a question first', 'warn'); return; }
  $('ask-btn').disabled = true;
  $('answer-card').classList.add('visible');
  $('answer-text').innerHTML = '<span class="spinner"></span> Thinking…';
  $('citations').innerHTML = '';
  const res = await call('/query', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({question: q}),
  });
  $('ask-btn').disabled = false;
  if (!res.ok) {
    $('answer-text').innerHTML = `<span style="color:var(--error);">${res.body.detail || 'Error'}</span>`;
    return;
  }
  $('answer-text').textContent = res.body.answer;
  const c = res.body.citations || [];
  if (c.length) {
    $('citations').innerHTML = '<div class="muted" style="font-size:0.78rem; margin-top:0.6rem;">📎 Citations from your documents:</div>' +
      c.map(x => `
        <div class="citation">
          <div class="head">
            <span>chunk ${x.chunk}</span>
            <span class="score">score ${(x.score || 0).toFixed(1)}</span>
          </div>
          <div class="body">${(x.text || '').replace(/</g, '&lt;')}</div>
        </div>
      `).join('');
  } else {
    $('citations').innerHTML = '<div class="muted" style="font-size:0.82rem; margin-top:0.6rem;">No citations matched. Try a question closer to your uploaded content.</div>';
  }
}

$('question').addEventListener('keydown', e => { if (e.key === 'Enter') ask(); });

// ============================================================================
// Doc list
// ============================================================================
async function refresh() {
  const res = await call('/docs/list');
  if (!res.ok || !res.body.docs || !res.body.docs.length) {
    $('docs').innerHTML = '<div class="empty">No documents yet — upload one above.</div>';
    return;
  }
  $('docs').innerHTML = res.body.docs.map(d => `
    <div class="doc-item">
      <div>
        <div class="name">${d.filename || d.doc_id}</div>
        <div class="meta">${(d.chars || 0).toLocaleString()} chars · ${(d.size || 0).toLocaleString()} bytes</div>
      </div>
      <div class="meta">${(d.doc_id || '').slice(0, 8)}…</div>
    </div>
  `).join('');
}

// ============================================================================
// Boot
// ============================================================================
loadStatus();
refresh();
</script>
</body>
</html>
