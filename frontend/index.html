<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>StudyBot — AI Study Buddy</title>
<link rel="stylesheet" href="global.css">
<script>
  // ---------- Early Theme Initialization ----------
  (function() {
    const savedTheme = localStorage.getItem('studybot-theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
  })();
</script>
</head>
<body>

<header class="header-glass">
  <div class="topbar">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path>
          <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path>
        </svg>
      </div>
      <div class="brand-info">
        <h1>StudyBot</h1>
        <p>AI Study Buddy — upload notes, ask questions, get cited answers</p>
      </div>
    </div>
    
    <div class="header-actions">
      <div class="status-pills" id="status-pills">
        <span class="pill">
          <span class="spinner"></span> 
          Loading system status...
        </span>
      </div>
      
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle Light/Dark Theme">
        <!-- Sun Icon (visible in Light theme) -->
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="19.78"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="5.64"></line>
        </svg>
        <!-- Moon Icon (visible in Dark theme) -->
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>
    </div>
  </div>
</header>

<main class="dashboard-grid">
  <!-- Left Column: Sidebar Document Manager -->
  <aside class="sidebar">
    <section class="card">
      <div class="card-header">
        <div class="card-title-group">
          <span class="step">3</span>
          <h2>Your Library</h2>
        </div>
        <button class="ghost" onclick="refresh()" style="padding: 0.4rem 0.75rem; font-size: 0.78rem;">
          <svg style="width:14px;height:14px;margin-right:2px;vertical-align:middle;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
          </svg>
          Refresh
        </button>
      </div>
      <div class="doc-list" id="docs">
        <div class="empty">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 44px; height: 44px; margin-bottom: 0.5rem; opacity: 0.4;">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
          </svg>
          <div>No documents yet — upload one above.</div>
        </div>
      </div>
    </section>
  </aside>

  <!-- Right Column: Main Working Canvas -->
  <div class="main-content">
    <!-- Step 1: Upload Card -->
    <section class="card">
      <div class="card-header">
        <div class="card-title-group">
          <span class="step">1</span>
          <h2>Upload a lecture</h2>
        </div>
        <span class="meta">PDF, TXT, or Markdown</span>
      </div>
      <label class="drop" id="drop">
        <div class="drop-icon-container">
          <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z" />
          </svg>
        </div>
        <p><strong>Drag a file here</strong> or <span class="browse">click to browse</span></p>
        <p class="muted" style="font-size:0.78rem; margin-top: 0.5rem;">Max ~10MB. Try a Wikipedia article from <code>sample_data/</code>.</p>
        <input type="file" id="file" accept=".pdf,.txt,.md">
      </label>
      <div id="upload-result"></div>
    </section>

    <!-- Step 2: Ask Question Card -->
    <section class="card">
      <div class="card-header">
        <div class="card-title-group">
          <span class="step">2</span>
          <h2>Ask a question</h2>
        </div>
        <span class="meta">Grounded in your uploaded notes</span>
      </div>
      
      <div class="chat-container">
        <!-- AI Premium Chat bubbles stream -->
        <div class="answer-card" id="answer-card">
          <!-- Messages will be dynamically rendered here -->
        </div>
        
        <div class="input-row">
          <input type="text" id="question" placeholder="Ask your AI buddy about the uploaded notes..." autocomplete="off">
          <button class="primary" id="ask-btn" onclick="ask()">
            Ask
            <svg style="width:16px;height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>
    </section>

    <!-- Raw Drawer (Accordion) -->
    <details>
      <summary>
        <svg style="width:14px;height:14px;vertical-align:middle;" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M12.316 3.051a1 1 0 01.633 1.265l-4 12a1 1 0 11-1.898-.632l4-12a1 1 0 011.265-.633zM5.707 6.293a1 1 0 010 1.414L3.414 10l2.293 2.293a1 1 0 11-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0zm8.586 0a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 11-1.414-1.414L16.586 10l-2.293-2.293a1 1 0 010-1.414z" clip-rule="evenodd"/>
        </svg>
        Raw API responses (debug)
      </summary>
      <pre id="debug-log">No requests yet.</pre>
    </details>
  </div>
</main>

<div class="toasts" id="toasts"></div>

<script>
// ============================================================================
// Multi-Tenant & Config Setup
// ============================================================================
function detectTenant() {
  const hostname = window.location.hostname;
  let tenant = 'default';
  
  if (hostname.endsWith('.restx.food')) {
    tenant = hostname.replace('.restx.food', '');
  } else if (hostname.endsWith('.localhost')) {
    tenant = hostname.replace('.localhost', '');
  } else {
    // Allows query override e.g. ?tenant=demo or ?tenant=admin for local testing
    tenant = new URLSearchParams(location.search).get('tenant') || 'default';
  }
  
  document.documentElement.setAttribute('data-tenant', tenant);
  return tenant;
}

const ACTIVE_TENANT = detectTenant();

const API_BASE = (window.API_BASE
  || new URLSearchParams(location.search).get('api')
  || '').replace(/\/$/, '');

const USER_ID = (new URLSearchParams(location.search).get('user') || 'test-user-001');

// ============================================================================
// Light/Dark Theme Switcher
// ============================================================================
function toggleTheme() {
  const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';
  const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', newTheme);
  localStorage.setItem('studybot-theme', newTheme);
  toast(`Switched to ${newTheme} mode`, 'success');
}

// ============================================================================
// Helpers
// ============================================================================
function $(id) { return document.getElementById(id); }

function toast(msg, type = '') {
  const el = document.createElement('div');
  el.className = 'toast ' + type;
  el.textContent = msg;
  $('toasts').appendChild(el);
  setTimeout(() => el.style.opacity = '0', 2500);
  setTimeout(() => el.remove(), 3000);
}

function logDebug(label, data) {
  const lines = $('debug-log').textContent === 'No requests yet.' ? [] : $('debug-log').textContent.split('\n');
  lines.unshift(`── ${new Date().toLocaleTimeString()} — ${label} ──\n${JSON.stringify(data, null, 2)}\n`);
  $('debug-log').textContent = lines.slice(0, 6).join('\n');
}

async function call(path, opts = {}) {
  opts.headers = Object.assign({'X-User-Id': USER_ID}, opts.headers || {});
  const r = await fetch(API_BASE + path, opts);
  const text = await r.text();
  let body;
  try { body = JSON.parse(text); } catch { body = text; }
  logDebug(`${opts.method || 'GET'} ${path}`, body);
  return {ok: r.ok, status: r.status, body};
}

// ============================================================================
// Backend status
// ============================================================================
async function loadStatus() {
  const res = await call('/health');
  if (!res.ok) {
    $('status-pills').innerHTML = '<span class="pill error">backend offline</span>';
    return;
  }
  
  // Render status pills dynamically
  const statusHtml = Object.entries(res.body.backends)
    .map(([k, v]) => `<span class="pill ${v === 'local' ? 'local' : 'remote'}">${k}: ${v}</span>`)
    .join('');
    
  // Append current active tenant name for visual transparency
  const tenantBadgeHtml = `<span class="pill" style="border-color: rgba(var(--accent-rgb), 0.3); background: rgba(var(--accent-rgb), 0.1); color: var(--accent);">tenant: ${ACTIVE_TENANT}</span>`;
  
  $('status-pills').innerHTML = tenantBadgeHtml + statusHtml;
}

// ============================================================================
// Upload
// ============================================================================
const drop = $('drop');
const fileInput = $('file');

drop.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('dragover'); });
drop.addEventListener('dragleave', () => drop.classList.remove('dragover'));
drop.addEventListener('drop', e => {
  e.preventDefault();
  drop.classList.remove('dragover');
  if (e.dataTransfer.files[0]) doUpload(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => { if (e.target.files[0]) doUpload(e.target.files[0]); });

async function doUpload(file) {
  $('upload-result').innerHTML = `
    <p class="muted" style="margin:0.8rem 0 0; font-size: 0.88rem; display: flex; align-items: center; gap: 0.5rem;">
      <span class="spinner"></span> 
      Uploading ${file.name} (${(file.size/1024).toFixed(1)} KB)…
    </p>`;
    
  const fd = new FormData();
  fd.append('file', file);
  const res = await call('/upload', {method: 'POST', body: fd});
  
  if (!res.ok) {
    toast(`Upload failed: ${res.body.detail || res.status}`, 'error');
    $('upload-result').innerHTML = `
      <p style="color:var(--error); margin:0.8rem 0 0; font-size: 0.88rem; font-weight: 500;">
        ${res.body.detail || 'Upload failed'}
      </p>`;
    return;
  }
  
  const b = res.body;
  $('upload-result').innerHTML = `
    <div class="upload-success-alert">
      <div class="upload-success-title">
        <svg style="width:16px;height:16px;" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
        </svg>
        <strong>${b.filename}</strong>
      </div>
      <div>${b.chars_extracted.toLocaleString()} chars extracted &amp; indexed</div>
      <div class="upload-success-meta">doc_id: ${b.doc_id}</div>
    </div>`;
    
  toast(`Uploaded ${b.filename}`, 'success');
  refresh();
}

// ============================================================================
// AI Chat Premium Messenger logic
// ============================================================================
function renderWelcomeMessage() {
  const card = $('answer-card');
  card.classList.add('visible');
  card.innerHTML = `
    <div class="chat-bubble ai">
      <div class="bubble-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 18px; height: 18px;">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
      </div>
      <div class="bubble-content">
        <div class="bubble-sender">StudyBot</div>
        <div class="bubble-text">Hello! I am your AI Study Buddy. Upload your lecture notes on the left, then ask me anything about them. I will research the content and give you answers with detailed citations.</div>
      </div>
    </div>
  `;
}

async function ask() {
  const q = $('question').value.trim();
  if (!q) { toast('Type a question first', 'warn'); return; }
  
  // Clear the input box immediately to support chat feel
  $('question').value = '';
  
  // 1. Remove previous response IDs to avoid duplicated query selectors in DOM
  const prevAns = $('answer-text');
  if (prevAns) prevAns.removeAttribute('id');
  const prevCit = $('citations');
  if (prevCit) prevCit.removeAttribute('id');
  
  // 2. Append User Bubble
  const userBubbleHtml = `
    <div class="chat-bubble user">
      <div class="bubble-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
          <circle cx="12" cy="7" r="4"></circle>
        </svg>
      </div>
      <div class="bubble-content">
        <div class="bubble-sender">You</div>
        <div class="bubble-text">${q.replace(/</g, '&lt;')}</div>
      </div>
    </div>
  `;
  $('answer-card').insertAdjacentHTML('beforeend', userBubbleHtml);
  
  // 3. Append AI thinking bubble placeholder
  const aiBubbleHtml = `
    <div class="chat-bubble ai">
      <div class="bubble-avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 18px; height: 18px;">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
        </svg>
      </div>
      <div class="bubble-content">
        <div class="bubble-sender">StudyBot</div>
        <div class="bubble-text" id="answer-text">
          <div class="typing-indicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>
        <div id="citations"></div>
      </div>
    </div>
  `;
  $('answer-card').insertAdjacentHTML('beforeend', aiBubbleHtml);
  
  // Scroll to bottom immediately after adding the message
  $('answer-card').scrollTop = $('answer-card').scrollHeight;
  
  // 4. Fire API Request
  $('ask-btn').disabled = true;
  const res = await call('/query', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({question: q}),
  });
  $('ask-btn').disabled = false;
  
  // 5. Render Response
  if (!res.ok) {
    $('answer-text').innerHTML = `<span style="color:var(--error); font-weight: 500;">${res.body.detail || 'Error occurred while querying the notes.'}</span>`;
    $('answer-card').scrollTop = $('answer-card').scrollHeight;
    return;
  }
  
  $('answer-text').textContent = res.body.answer;
  const c = res.body.citations || [];
  if (c.length) {
    $('citations').innerHTML = `
      <div class="citations-title">
        <svg style="width:12px;height:12px;vertical-align:middle;" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M12.586 4.586a2 2 0 112.828 2.828l-3 3a2 2 0 01-2.828 0 1 1 0 00-1.414 1.414 4 4 0 005.656 0l3-3a4 4 0 00-5.656-5.656l-1.5 1.5a1 1 0 101.414 1.414l1.5-1.5zm-5 5a2 2 0 012.828 0 1 1 0 101.414-1.414 4 4 0 00-5.656 0l-3 3a4 4 0 105.656 5.656l1.5-1.5a1 1 0 10-1.414-1.414l-1.5 1.5a2 2 0 11-2.828-2.828l3-3z" clip-rule="evenodd"/>
        </svg>
        Citations from your documents
      </div>` +
      c.map(x => `
        <div class="citation">
          <div class="head">
            <span>
              <svg style="width:12px;height:12px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                <polyline points="14 2 14 8 20 8"></polyline>
              </svg>
              chunk ${x.chunk}
            </span>
            <span class="score">score ${(x.score || 0).toFixed(1)}</span>
          </div>
          <div class="body">${(x.text || '').replace(/</g, '&lt;')}</div>
        </div>
      `).join('');
  } else {
    $('citations').innerHTML = '<div class="muted" style="font-size:0.82rem; margin-top:0.6rem; text-align: center;">No citations matched.</div>';
  }
  
  // Smooth scroll to bottom after rendering answer and citations
  setTimeout(() => {
    $('answer-card').scrollTo({
      top: $('answer-card').scrollHeight,
      behavior: 'smooth'
    });
  }, 50);
}

$('question').addEventListener('keydown', e => { if (e.key === 'Enter') ask(); });

// ============================================================================
// Doc list
// ============================================================================
async function refresh() {
  const res = await call('/docs/list');
  if (!res.ok || !res.body.docs || !res.body.docs.length) {
    $('docs').innerHTML = `
      <div class="empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 44px; height: 44px; margin-bottom: 0.5rem; opacity: 0.4;">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
        </svg>
        <div>No documents yet — upload one above.</div>
      </div>`;
    return;
  }
  
  $('docs').innerHTML = res.body.docs.map(d => `
    <div class="doc-item">
      <div class="doc-item-left">
        <div class="doc-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <line x1="16" y1="13" x2="8" y2="13"></line>
            <line x1="16" y1="17" x2="8" y2="17"></line>
            <polyline points="10 9 9 9 8 9"></polyline>
          </svg>
        </div>
        <div>
          <div class="name">${d.filename || d.doc_id}</div>
          <div class="meta">${(d.chars || 0).toLocaleString()} chars &middot; ${(d.size/1024).toFixed(1)} KB</div>
        </div>
      </div>
      <div class="doc-item-right">${(d.doc_id || '').slice(0, 8)}</div>
    </div>
  `).join('');
}

// ============================================================================
// Boot
// ============================================================================
loadStatus();
refresh();
renderWelcomeMessage();
</script>
</body>
</html>
