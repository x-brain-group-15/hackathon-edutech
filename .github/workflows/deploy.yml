name: Deploy StudyBot (AWS SAM CI/CD)

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test-and-deploy:
    name: Test and Deploy Stack
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up Python environment
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # 3. Install Python dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. Run automated test suite (Safety Gate)
      - name: Run Tests
        run: |
          pytest -v tests/

      # 5. Set up AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1 # Khớp với region trong samconfig.toml

      # 6. Set up AWS SAM CLI
      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-container: false

      # 7. Build SAM Stack
      - name: SAM Build
        run: |
          sam build

      # 8. Deploy SAM Stack (Automated without prompt)
      - name: SAM Deploy
        run: |
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset
